<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XJTLU 升学寻宝图 - 智能升学规划平台</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 响应式变量系统 */
        :root {
            /* 浅色模式变量 (Swiss Spa Light) */
            --bg-body: #F9FAFB;
            --bg-surface: #FFFFFF;
            --bg-hover: #F3F4F6;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --primary: #000000;
            --primary-hover: #374151;
            --marker-fill: #1E3A8A; /* 海军蓝 */
            --shadow-subtle: 0 4px 24px rgba(0, 0, 0, 0.04);
            --shadow-modal: 0 10px 40px rgba(0, 0, 0, 0.08);
            --nav-bg: rgba(255, 255, 255, 0.85);
            --success-bg: #ECFDF5;
            --success-text: #10B981;
            --danger-bg: #FEF2F2;
            --danger-text: #EF4444;
        }

        [data-theme="dark"] {
            /* 深色模式变量 (Midnight Minimalist) */
            --bg-body: #050505;
            --bg-surface: #0F0F0F;
            --bg-hover: #1A1A1A;
            --text-main: #FAFAFA;
            --text-muted: #A1A1AA;
            --border: #262626;
            --primary: #FFFFFF;
            --primary-hover: #E5E5E5;
            --marker-fill: #3B82F6; /* 亮蓝 */
            --shadow-subtle: 0 4px 24px rgba(0, 0, 0, 0.2);
            --shadow-modal: 0 10px 50px rgba(0, 0, 0, 0.4);
            --nav-bg: rgba(10, 10, 10, 0.85);
            --success-bg: rgba(16, 185, 129, 0.1);
            --success-text: #34D399;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --danger-text: #F87171;
        }

        body, html {
            height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            overflow: hidden;
            transition: background 0.4s ease, color 0.4s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* 顶部导航栏 */
        #navbar {
            position: fixed; top: 0; left: 0; right: 0; height: 64px;
            background: var(--nav-bg);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            display: flex; align-items: center; justify-content: space-between; padding: 0 32px;
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        .nav-brand {
            font-size: 16px; font-weight: 600; color: var(--text-main);
            display: flex; align-items: center; gap: 12px; letter-spacing: -0.2px;
        }

        .nav-links { display: flex; gap: 8px; flex: 1; margin-left: 48px;}
        .nav-link {
            background: transparent; border: none; color: var(--text-muted);
            padding: 8px 16px; border-radius: 8px; cursor: pointer;
            transition: all 0.2s; font-size: 14px; font-weight: 500;
            display: flex; align-items: center; gap: 8px;
        }
        .nav-link:hover, .nav-link.active { color: var(--text-main); background: var(--bg-hover); }

        .nav-right { display: flex; align-items: center; gap: 12px; }

        .icon-btn {
            background: transparent; border: 1px solid transparent; color: var(--text-muted);
            width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:hover { background: var(--bg-hover); color: var(--text-main); border-color: var(--border); }

        /* 主容器 */
        #main-container { position: fixed; top: 64px; left: 0; right: 0; bottom: 0; display: flex; }

        /* 左侧边栏 */
        #left-sidebar {
            width: 380px; background: var(--bg-surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 900;
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        /* 地图区域 */
        #map-container { flex: 1; position: relative; background: var(--bg-body); }
        #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }

        /* 内容板块样式 */
        .sidebar-panel { height: 100%; display: flex; flex-direction: column; }
        .panel-header { padding: 24px 32px 16px; }
        .panel-header h3 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }

        .panel-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 32px; gap: 24px; }
        .panel-tab {
            background: none; border: none; color: var(--text-muted); padding: 12px 0;
            cursor: pointer; font-size: 14px; font-weight: 500; position: relative;
        }
        .panel-tab.active { color: var(--text-main); }
        .panel-tab.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
            height: 2px; background: var(--text-main);
        }

        .tab-content { display: none; flex: 1; overflow-y: auto; padding: 24px 32px; }
        .tab-content.active { display: block; }

        /* 统一卡片样式 */
        .user-section, .api-section, .fav-item, .ach-node-content, .uni-stat, .ai-senior-section, .emotion-response, .quiz-option {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 20px; margin-bottom: 20px;
            box-shadow: var(--shadow-subtle); transition: all 0.4s ease;
        }

        /* 按钮样式 */
        .btn-primary {
            width: 100%; padding: 12px; background: var(--primary); border: none;
            border-radius: 8px; color: var(--bg-surface); font-weight: 500; font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.85; }
        
        .btn-secondary {
            width: 100%; padding: 12px; background: transparent; border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-main); font-weight: 500; font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.2s;
        }
        .btn-secondary:hover { background: var(--bg-hover); }

        .btn-link { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; text-decoration: underline; }
        .btn-link:hover { color: var(--text-main); }

        /* 表单输入 */
        input, select {
            width: 100%; padding: 12px 16px; background: var(--bg-body);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text-main);
            font-size: 14px; transition: all 0.2s; font-family: inherit; margin-bottom: 16px;
        }
        input:focus { outline: none; border-color: var(--text-muted); }
        .form-group label { display: block; color: var(--text-muted); margin-bottom: 8px; font-size: 13px; font-weight: 500; }

        /* 聊天气泡 */
        .chat-box { background: var(--bg-body); border-radius: 8px; height: 320px; padding: 20px; overflow-y: auto; margin-bottom: 16px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 16px;}
        .chat-msg { display: flex; flex-direction: column; }
        .chat-user { align-items: flex-end; }
        .chat-ai { align-items: flex-start; }
        .msg { padding: 12px 16px; border-radius: 12px; font-size: 14px; max-width: 85%; line-height: 1.5; }
        .chat-user .msg { background: var(--primary); color: var(--bg-surface); border-radius: 12px 12px 4px 12px;}
        .chat-ai .msg { background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-main); border-radius: 12px 12px 12px 4px; box-shadow: var(--shadow-subtle);}

        /* 模态框 */
        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px);
        }
        .modal-content {
            background: var(--bg-surface); margin: 6vh auto; border-radius: 12px;
            border: 1px solid var(--border); width: 90%; max-width: 480px;
            box-shadow: var(--shadow-modal); overflow: hidden; max-height: 85vh; display: flex; flex-direction: column;
        }
        .modal-header { padding: 24px 32px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .modal-body { padding: 32px; overflow-y: auto; }

        /* 特定业务组件细化 */
        .user-info { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .user-avatar-large { width: 48px; height: 48px; border-radius: 50%; background: var(--bg-hover); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
        .user-stats { display: flex; gap: 24px; border-top: 1px solid var(--border); padding-top: 20px; }
        .stat-item { flex: 1; }
        .stat-num { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; }

        .fav-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; margin-bottom: 12px;}
        .fav-item:hover { border-color: var(--text-muted); }
        .fav-name { font-weight: 500; font-size: 14px; margin-bottom: 4px; }
        .fav-meta { font-size: 12px; color: var(--text-muted); }
        
        .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }

        /* 答题系统 */
        .progress-bar { width: 100%; height: 6px; background: var(--bg-hover); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { height: 100%; background: var(--text-main); transition: width 0.3s ease; }
        .quiz-option { cursor: pointer; padding: 16px 20px; font-weight: 500; font-size: 14px; margin-bottom: 12px;}
        .quiz-option:hover { border-color: var(--text-muted); }
        .quiz-option.selected { border-color: var(--text-main); background: var(--bg-hover); }
        .quiz-option.correct { border-color: var(--success-text); color: var(--success-text); background: var(--success-bg); }
        .quiz-option.incorrect { border-color: var(--danger-text); color: var(--danger-text); background: var(--danger-bg); }

        /* 情感系统 */
        .emotion-moods { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px; }
        .emotion-mood { text-align: center; padding: 24px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .emotion-mood:hover { border-color: var(--text-muted); }
        .emotion-mood.active { border-color: var(--text-main); background: var(--bg-hover); }

        /* Map Popup */
        .treasure-tooltip { background: var(--bg-surface) !important; border: 1px solid var(--border) !important; border-radius: 4px !important; padding: 8px 12px !important; color: var(--text-main) !important; font-size: 13px !important; font-family: inherit !important; font-weight: 500 !important; box-shadow: var(--shadow-subtle) !important; }
        .treasure-tooltip::after { display: none !important; }
        
        /* 响应式 */
        @media(max-width: 1024px) {
            #left-sidebar { position: fixed; left: -380px; top: 64px; bottom: 0; }
            #left-sidebar.open { left: 0; box-shadow: var(--shadow-modal); }
            .nav-links { display: none; }
        }
    </style>
</head>
<body data-theme="light">
    <nav id="navbar">
        <div class="nav-brand">
            <i data-lucide="compass"></i> XJTLU 升学寻宝图
        </div>
        <div class="nav-links">
            <button class="nav-link active" data-panel="home"><i data-lucide="layout-grid" style="width:16px;"></i> 探索</button>
            <button class="nav-link" data-panel="quiz"><i data-lucide="target" style="width:16px;"></i> 挑战</button>
            <button class="nav-link" data-panel="emotion"><i data-lucide="heart" style="width:16px;"></i> 疏导</button>
        </div>
        <div class="nav-right">
            <button class="icon-btn" id="theme-toggle" title="切换模式"><i data-lucide="moon"></i></button>
            <button class="icon-btn" id="achievement-btn" title="成就"><i data-lucide="trophy"></i></button>
            <button class="icon-btn" id="user-avatar" title="账户"><i data-lucide="user"></i></button>
            <button class="icon-btn" id="toggle-sidebar" style="display:none;"><i data-lucide="menu"></i></button>
        </div>
    </nav>

    <div id="main-container">
        <aside id="left-sidebar">
            <div class="sidebar-panel">
                <div class="panel-header">
                    <h3><i data-lucide="library"></i> 指南针</h3>
                </div>
                <div class="panel-tabs">
                    <button class="panel-tab active" data-tab="user-tab">账户</button>
                    <button class="panel-tab" data-tab="chat-tab">顾问 AI</button>
                    <button class="panel-tab" data-tab="fav-tab">清单</button>
                </div>

                <div id="user-tab" class="tab-content active">
                    <div class="user-section">
                        <div class="user-info">
                            <div class="user-avatar-large"><i data-lucide="user"></i></div>
                            <div>
                                <h4 id="user-name" style="font-size:16px; font-weight:600; margin-bottom:4px;">未验证身份</h4>
                                <p id="user-status" style="font-size:13px; color:var(--text-muted)">登录以同步进度</p>
                            </div>
                        </div>
                        <div class="user-stats">
                            <div class="stat-item"><div class="stat-num" id="stat-achievements">0</div><div class="stat-label">成就</div></div>
                            <div class="stat-item"><div class="stat-num" id="stat-favorites">0</div><div class="stat-label">清单</div></div>
                        </div>
                    </div>
                    
                    <div class="api-section" id="api-section">
                        <h4 style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase;">配置 API</h4>
                        <input type="password" id="api-key-input" placeholder="输入 API Key...">
                        <button class="btn-primary" id="submit-api"><i data-lucide="key" style="width:16px;"></i> 验证并连接</button>
                    </div>
                    
                    <div id="api-unlocked-section" class="user-section" style="display:none; display:flex; align-items:center; justify-content:space-between; padding: 16px 20px;">
                        <div style="display:flex; align-items:center; gap:8px;"><i data-lucide="check-circle" style="color:var(--success-text); width:18px;"></i><span style="font-size:14px; font-weight:500;">AI 已连接</span></div>
                        <button class="btn-link" id="reset-api">断开</button>
                    </div>
                    
                    <div id="login-section">
                        <button class="btn-primary" id="show-login">登录系统</button>
                    </div>
                </div>

                <div id="chat-tab" class="tab-content">
                    <div class="chat-box" id="chat-box">
                        <div class="chat-msg chat-ai"><div class="msg">您好。我是您的升学规划助理。配置 API 后即可随时向我提问。</div></div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="chat-input" placeholder="输入问题..." style="margin-bottom:0; border-radius:24px;">
                        <button class="btn-primary" id="chat-send" style="width:48px; border-radius:50%; padding:0; flex-shrink:0;"><i data-lucide="send" style="width:18px; margin-left:-2px;"></i></button>
                    </div>
                </div>

                <div id="fav-tab" class="tab-content">
                    <div id="favorites-list"></div>
                </div>
            </div>
        </aside>

        <div id="map-container">
            <div id="map"></div>
        </div>
    </div>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3><i data-lucide="log-in"></i> 账户访问</h3><button class="icon-btn modal-close"><i data-lucide="x"></i></button></div>
            <div class="modal-body">
                <div id="login-form-container">
                    <div class="form-group"><label>账户名</label><input type="text" id="login-account" placeholder="输入账户"></div>
                    <div class="form-group"><label>密码</label><input type="password" id="login-password" placeholder="输入密码"></div>
                    <button class="btn-primary" id="login-submit" style="margin-top:8px;">登 录</button>
                    <div style="display:flex; justify-content:space-between; margin-top:16px;">
                        <button class="btn-link" id="show-register">创建新账户</button>
                        <button class="btn-link">找回密码</button>
                    </div>
                </div>
                <div id="register-form-container" style="display:none">
                    <div class="form-group"><label>姓名</label><input type="text" id="reg-username"></div>
                    <div class="form-group"><label>学号</label><input type="text" id="reg-student-id"></div>
                    <div class="form-group"><label>账户名</label><input type="text" id="reg-account"></div>
                    <div class="form-group"><label>密码</label><input type="password" id="reg-password"></div>
                    <button class="btn-primary" id="register-submit" style="margin-top:8px;">注 册</button>
                    <button class="btn-secondary" id="back-to-login" style="margin-top:12px;">返回登录</button>
                </div>
            </div>
        </div>
    </div>

    <div id="achievement-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3><i data-lucide="award"></i> 成就记录</h3><button class="icon-btn modal-close"><i data-lucide="x"></i></button></div>
            <div class="modal-body">
                <div id="achievement-tree"></div>
            </div>
        </div>
    </div>

    <div id="quiz-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3><i data-lucide="check-square"></i> 知识库测验</h3><button class="icon-btn modal-close"><i data-lucide="x"></i></button></div>
            <div class="modal-body">
                <div id="quiz-start" style="text-align:center; padding: 20px 0;">
                    <i data-lucide="book-open" style="width:48px; height:48px; color:var(--text-muted); margin-bottom:16px;"></i>
                    <h4 style="font-size:20px; margin-bottom:8px;">升学准备测验</h4>
                    <p style="color:var(--text-muted); margin-bottom:32px; font-size:14px;">包含30道核心测试题，完成以验证您的准备度。</p>
                    <button class="btn-primary" id="start-quiz">开始测验</button>
                </div>
                <div id="quiz-game" style="display:none">
                    <div class="progress-bar"><div class="progress-fill" id="quiz-progress-fill"></div></div>
                    <p style="text-align:right; font-size:12px; color:var(--text-muted); margin-bottom:24px;">进度 <span id="quiz-level-num">1</span> / 30</p>
                    <div id="quiz-question" style="font-size:18px; font-weight:500; line-height:1.5; margin-bottom:24px;"></div>
                    <div id="quiz-options"></div>
                    <button class="btn-primary" id="quiz-submit" style="margin-top:16px;">确认提交</button>
                </div>
                <div id="quiz-result" style="display:none; text-align:center; padding:20px 0;">
                    <div id="quiz-result-icon-container" style="margin-bottom:16px; display:flex; justify-content:center;"></div>
                    <h4 id="quiz-result-title" style="font-size:20px; margin-bottom:8px;"></h4>
                    <p id="quiz-result-msg" style="color:var(--text-muted); margin-bottom:32px; font-size:14px;"></p>
                    <div style="display:flex; gap:12px;">
                        <button class="btn-secondary" id="quiz-retry" style="flex:1;">返回重试</button>
                        <button class="btn-primary" id="quiz-next" style="flex:1;">继续下一题</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="emotion-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3><i data-lucide="coffee"></i> 状态调节</h3><button class="icon-btn modal-close"><i data-lucide="x"></i></button></div>
            <div class="modal-body">
                <p style="color:var(--text-muted); font-size:14px; margin-bottom:20px;">记录您当前的备考状态：</p>
                <div class="emotion-moods">
                    <div class="emotion-mood" data-mood="great"><i data-lucide="sun" style="width:32px;height:32px; margin-bottom:12px;"></i><div style="font-size:14px; font-weight:500;">状态极佳</div></div>
                    <div class="emotion-mood" data-mood="okay"><i data-lucide="minus" style="width:32px;height:32px; margin-bottom:12px;"></i><div style="font-size:14px; font-weight:500;">平稳前行</div></div>
                    <div class="emotion-mood" data-mood="stressed"><i data-lucide="cloud-lightning" style="width:32px;height:32px; margin-bottom:12px;"></i><div style="font-size:14px; font-weight:500;">感到压力</div></div>
                    <div class="emotion-mood" data-mood="anxious"><i data-lucide="cloud-rain" style="width:32px;height:32px; margin-bottom:12px;"></i><div style="font-size:14px; font-weight:500;">有些焦虑</div></div>
                </div>
                <div class="emotion-response" id="emotion-response" style="display:none">
                    <h4 id="emotion-title" style="font-size:16px; font-weight:600; margin-bottom:8px;"></h4>
                    <p id="emotion-text" style="font-size:14px; color:var(--text-muted); line-height:1.6;"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="uni-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3 id="uni-modal-title">院校档案</h3><button class="icon-btn modal-close"><i data-lucide="x"></i></button></div>
            <div class="modal-body" id="uni-modal-content"></div>
        </div>
    </div>

    <script>
        // ==================== 1. 基础配置与主题管理 ====================
        lucide.createIcons();
        function refreshIcons() { lucide.createIcons(); }

        let currentTheme = localStorage.getItem('theme') || 'light';
        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            currentTheme = theme;
            localStorage.setItem('theme', theme);
            const btn = document.getElementById('theme-toggle');
            if(btn) {
                btn.innerHTML = theme === 'light' ? '<i data-lucide="moon"></i>' : '<i data-lucide="sun"></i>';
                refreshIcons();
            }
            updateMapStyle();
        }

        let currentQuestionIndex = 0;
        let selectedOption = null;

        function loadQuizQuestion() {
            if (currentQuestionIndex >= quizQuestions.length) return;
            const q = quizQuestions[currentQuestionIndex];
            document.getElementById('quiz-level-num').textContent = currentQuestionIndex + 1;
            document.getElementById('quiz-progress-fill').style.width = `${((currentQuestionIndex) / quizQuestions.length) * 100}%`;
            document.getElementById('quiz-question').textContent = `${currentQuestionIndex + 1}. ${q.q}`;
            
            const container = document.getElementById('quiz-options');
            container.innerHTML = '';
            q.o.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'quiz-option'; div.textContent = opt;
                div.onclick = () => {
                    document.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
                    div.classList.add('selected'); selectedOption = i;
                };
                container.appendChild(div);
            });
        }

        document.getElementById('start-quiz').onclick = () => {
            document.getElementById('quiz-start').style.display = 'none';
            document.getElementById('quiz-game').style.display = 'block';
            currentQuestionIndex = 0; loadQuizQuestion();
        };

        document.getElementById('quiz-submit').onclick = () => {
            if (selectedOption === null) return;
            const q = quizQuestions[currentQuestionIndex];
            const options = document.querySelectorAll('.quiz-option');
            
            if (selectedOption === q.a) { options[selectedOption].classList.add('correct'); } 
            else { options[selectedOption].classList.add('incorrect'); options[q.a].classList.add('correct'); }
            
            setTimeout(() => {
                currentQuestionIndex++; selectedOption = null;
                if (currentQuestionIndex >= quizQuestions.length) {
                    document.getElementById('quiz-game').style.display = 'none';
                    document.getElementById('quiz-result').style.display = 'block';
                    document.getElementById('quiz-result-icon-container').innerHTML = '<i data-lucide="check-circle" style="width:56px;height:56px;color:var(--success-text);"></i>';
                    document.getElementById('quiz-result-title').textContent = `测试全部完成`;
                    document.getElementById('quiz-result-msg').textContent = '您已完成全部 30 道升学准备测试题，基础扎实！';
                    document.getElementById('quiz-next').style.display = 'none';
                    refreshIcons();
                } else { loadQuizQuestion(); }
            }, 800);
        };

        document.getElementById('quiz-retry').onclick = () => {
            document.getElementById('quiz-result').style.display = 'none';
            document.getElementById('quiz-game').style.display = 'block';
            currentQuestionIndex = 0; loadQuizQuestion();
        };

        // ==================== 5. AI Chat & 其他模块 ====================
        const CHAT_PROMPT = `你是一位西浦(XJTLU)毕业的高级顾问，客观、极其专业、简练。回答需直接切中要害，分段清晰。`;
        function initAPI() {
            if (API_KEY) {
                document.getElementById('api-section').style.display = 'none';
                document.getElementById('api-unlocked-section').style.display = 'flex';
            }
        }
        
        document.getElementById('submit-api').onclick = () => {
            const val = document.getElementById('api-key-input').value.trim();
            if(val) { API_KEY = val; localStorage.setItem('xjlu_api_key', val); initAPI(); }
        };
        document.getElementById('reset-api').onclick = () => {
            API_KEY = null; localStorage.removeItem('xjlu_api_key');
            document.getElementById('api-section').style.display = 'block';
            document.getElementById('api-unlocked-section').style.display = 'none';
        };

        async function sendChat() {
            const input = document.getElementById('chat-input'); const msg = input.value.trim();
            if (!msg) return;
            if (!API_KEY) return alert('系统提示：请先在账户面板配置 API 访问。');
            
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="chat-msg chat-user"><div class="msg">${msg}</div></div>`;
            input.value = ''; box.scrollTop = box.scrollHeight;
            
            const typingId = 'typing-' + Date.now();
            box.innerHTML += `<div class="chat-msg chat-ai" id="${typingId}"><div class="msg"><i data-lucide="loader" style="animation:spin 2s linear infinite;width:16px;"></i></div></div>`;
            refreshIcons(); box.scrollTop = box.scrollHeight;
            
            try {
                const res = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}`},
                    body: JSON.stringify({model: 'deepseek-chat', messages: [{role:'system',content:CHAT_PROMPT},{role:'user',content:msg}], temperature: 0.3})
                });
                const data = await res.json();
                document.getElementById(typingId).remove();
                box.innerHTML += `<div class="chat-msg chat-ai"><div class="msg">${data.choices[0].message.content.replace(/\n/g, '<br>')}</div></div>`;
            } catch (e) {
                document.getElementById(typingId).remove();
                box.innerHTML += `<div class="chat-msg chat-ai"><div class="msg" style="color:var(--danger-text)">通信失败，请检查网络连接或 API 配置。</div></div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
        document.getElementById('chat-send').onclick = sendChat;
        document.getElementById('chat-input').onkeypress = (e) => { if(e.key === 'Enter') sendChat(); };

        // 情感系统
        const emotionData = {
            great: {title: '状态评估：极佳', text: '已为您建立表现日志。保持当前节奏与执行力。'},
            okay: {title: '状态评估：平稳', text: '平稳期是长期任务的常态。请继续按时间表推进各项准备。'},
            stressed: {title: '状态评估：高压', text: '建议启动降压流程：暂停当前工作，离开屏幕，执行15分钟的物理放松或环境切换。'},
            anxious: {title: '状态评估：焦虑', text: '焦虑源于控制感缺失。建议将宏大目标拆解为未来24小时内可执行的最小任务单元，逐一击破。'}
        };
        document.querySelectorAll('.emotion-mood').forEach(mood => {
            mood.onclick = () => {
                document.querySelectorAll('.emotion-mood').forEach(m => m.classList.remove('active'));
                mood.classList.add('active');
                const d = emotionData[mood.dataset.mood];
                document.getElementById('emotion-title').textContent = d.title;
                document.getElementById('emotion-text').textContent = d.text;
                document.getElementById('emotion-response').style.display = 'block';
            };
        });

        // 导航与模态框全局逻辑
        document.querySelectorAll('.panel-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.panel-tab, .tab-content').forEach(el => el.classList.remove('active'));
                tab.classList.add('active'); document.getElementById(tab.dataset.tab).classList.add('active');
            };
        });
        document.querySelectorAll('.nav-link').forEach(link => {
            link.onclick = () => {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                const panel = link.dataset.panel;
                if (panel === 'quiz') { document.getElementById('quiz-modal').style.display = 'flex'; }
                else if (panel === 'emotion') { document.getElementById('emotion-modal').style.display = 'flex'; }
                else if (panel === 'home' && window.innerWidth <= 1024) { document.getElementById('left-sidebar').classList.add('open'); }
            };
        });
        document.getElementById('toggle-sidebar').onclick = () => document.getElementById('left-sidebar').classList.toggle('open');
        document.querySelectorAll('.modal-close').forEach(btn => btn.onclick = () => btn.closest('.modal').style.display = 'none');
        window.onclick = e => { if (e.target.classList.contains('modal')) e.target.style.display = 'none'; };
        
        document.getElementById('show-register').onclick = () => { document.getElementById('login-form-container').style.display = 'none'; document.getElementById('register-form-container').style.display = 'block'; };
        document.getElementById('back-to-login').onclick = () => { document.getElementById('login-form-container').style.display = 'block'; document.getElementById('register-form-container').style.display = 'none'; };

        // ==================== 初始化 ====================
        setTheme(currentTheme);
        updateUserUI();
        renderFavorites();
        initAPI();
        
        // Spin 动画 CSS
        const styleSheet = document.createElement("style");
        styleSheet.innerText = "@keyframes spin { 100% { transform: rotate(360deg); } }";
        document.head.appendChild(styleSheet);
    </script>
</body>
</html>
